<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOLI | Iniciar sesión</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍝</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page" style="display:flex; align-items:center; justify-content:center; min-height:100vh; padding-top:0; padding-bottom:0;">
    <div class="card" style="max-width:400px; width:100%;">
      <div style="text-align:center; margin-bottom:24px;">
        <span style="font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted);">NOLI</span>
        <h1 id="auth-title" style="font-size:30px; color:var(--accent); margin-top:4px;">Iniciar sesión</h1>
      </div>

      <form id="form-auth">
        <div class="field">
          <label for="a-email">Correo</label>
          <input type="email" id="a-email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="a-password">Contraseña</label>
          <input type="password" id="a-password" required autocomplete="current-password" minlength="6" />
        </div>
        <div id="auth-message" style="font-size:13px; margin-bottom:16px; min-height:18px;"></div>
        <button type="submit" class="btn-primary" id="btn-submit" style="width:100%;">Iniciar sesión</button>
      </form>

      <div style="text-align:center; margin-top:18px; font-size:13px; color:var(--text-muted);">
        <span id="toggle-text">¿No tienes cuenta?</span>
        <a href="#" id="toggle-link" style="color:var(--accent);">Crear cuenta</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
